<svg width="2462" height="704" viewBox="0 0 1050 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="1050" height="300" fill="#FFFFFF"/>

  <!-- ===== ICON: crossed canes in thin circle frame ===== -->
  <g transform="translate(150,150)">
    <circle r="112" fill="none" stroke="#1A2F5A" stroke-width="3"/>
    <circle r="100" fill="none" stroke="#C9A84C" stroke-width="1.25"/>

    <!-- Cane 1: hook top-left, shaft to bottom-right -->
    <path d="M -38,-72 A 17,17 0 1 1 -54,-91 L 56,88"
          fill="none" stroke="#1A2F5A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Cane 2: hook top-right, shaft to bottom-left (mirror) -->
    <path d="M 38,-72 A 17,17 0 1 0 54,-91 L -56,88"
          fill="none" stroke="#1A2F5A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- crossing pin accent -->
    <circle cx="0" cy="8" r="5.5" fill="#B22234"/>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(330,118)" font-family="Cormorant Garamond, Georgia, 'Times New Roman', serif">
    <text x="0" y="0" font-size="34" fill="#1A2F5A" letter-spacing="1">VETERAN PROMISE PROJECT</text>
    <text x="0" y="85" font-size="38" fill="#1A2F5A" letter-spacing="2">SERVING THOSE WHO SERVED</text>
  </g>
</svg>
